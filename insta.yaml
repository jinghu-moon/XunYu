# insta.yaml
# Global redaction settings for snapshots

test_runner: cargo-test
snapshot_path: tests/snapshots

redactions:
  # Redact version numbers in "xun X.Y.Z"
  - ["xun [0-9]+\\.[0-9]+\\.[0-9]+", "xun [VERSION]"]
  # Redact Windows user paths
  - ["C:\\\\Users\\\\[^\\\\]+", "C:\\Users\\[USER]"]
  # Redact timestamps (e.g. 2026-05-15 14:16:27)
  - ["[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2}", "[TIMESTAMP]"]
