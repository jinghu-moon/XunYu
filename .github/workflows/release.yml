name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.93.1-x86_64-pc-windows-msvc

jobs:
  build-release:
    name: Build release package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard-ui/package-lock.json

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install $env:RUST_TOOLCHAIN --profile minimal
          rustup default $env:RUST_TOOLCHAIN
          rustc -V
          cargo -V

      - name: Install dashboard dependencies
        working-directory: dashboard-ui
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard-ui
        run: npm run build

      - name: Verify dashboard dist exists
        shell: pwsh
        run: |
          if (!(Test-Path "dashboard-ui/dist/index.html")) {
            throw "dashboard-ui/dist/index.html not found"
          }

      - name: Build release binaries
        run: cargo build --locked --release --features dashboard --bins

      - name: Verify release binaries
        shell: pwsh
        run: |
          if (!(Test-Path "target/release/xun.exe")) {
            throw "target/release/xun.exe not found"
          }
          if (!(Test-Path "target/release/xyu.exe")) {
            throw "target/release/xyu.exe not found"
          }

      - name: Show GitHub CLI version
        shell: pwsh
        run: gh --version

      - name: Package release archive
        id: package
        shell: pwsh
        run: |
          $label = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "manual-${{ github.run_number }}" }
          $packageRoot = "artifacts/XunYu-windows-x64"
          $zipPath = "artifacts/XunYu-windows-x64-$label.zip"

          if (Test-Path $packageRoot) {
            Remove-Item -Path $packageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null

          Copy-Item -Path "target/release/xun.exe" -Destination "$packageRoot/xun.exe"
          Copy-Item -Path "target/release/xyu.exe" -Destination "$packageRoot/xyu.exe"
          Copy-Item -Path "README.md" -Destination "$packageRoot/README.md"
          Copy-Item -Path "LICENSE" -Destination "$packageRoot/LICENSE"

          if (Test-Path $zipPath) {
            Remove-Item -Path $zipPath -Force
          }
          Compress-Archive -Path "$packageRoot/*" -DestinationPath $zipPath

          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: xunyu-windows-x64
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "${{ github.ref_name }}" "${{ steps.package.outputs.zip_path }}" --clobber
          }
          else {
            gh release create "${{ github.ref_name }}" "${{ steps.package.outputs.zip_path }}" --title "${{ github.ref_name }}" --generate-notes
          }
