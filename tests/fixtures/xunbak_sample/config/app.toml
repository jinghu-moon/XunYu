[server]
host = "0.0.0.0"
port = 8080
workers = 4

[server.tls]
enabled = false
cert_path = ""
key_path = ""

[backup]
default_codec = "zstd"
zstd_level = 1
skip_extensions = [".zip", ".7z", ".rar", ".gz", ".jpg", ".png", ".mp4"]
compression_min_size = 64
compression_benefit_threshold = 0.95

[backup.retention]
max_versions = 5
max_age_days = 90

[logging]
level = "info"
format = "json"
